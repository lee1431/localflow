<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STANCE LIVE EVENT / BROADCAST MODE</title>
  <style>
    :root {
      --bg: #f5f7f2;
      --grid: rgba(21, 56, 47, 0.06);
      --text: #15201c;
      --muted: #66706a;
      --line: rgba(21, 56, 47, 0.10);
      --line-strong: rgba(21, 56, 47, 0.16);
      --point: #204b40;
      --point-dark: #17372f;
      --point-soft: rgba(32, 75, 64, 0.08);
      --white: rgba(255,255,255,0.86);
      --live: #c84242;
      --shadow: 0 30px 80px rgba(21, 56, 47, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        radial-gradient(circle at 50% 45%, rgba(32, 75, 64, 0.04), transparent 38%),
        var(--bg);
      background-size: 28px 28px, 28px 28px, auto, auto;
    }

    body {
      position: relative;
    }

    .noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image:
        radial-gradient(circle at 20% 20%, #000 0.5px, transparent 0.5px),
        radial-gradient(circle at 70% 60%, #000 0.5px, transparent 0.5px),
        radial-gradient(circle at 40% 80%, #000 0.5px, transparent 0.5px);
      background-size: 160px 160px, 210px 210px, 180px 180px;
      mix-blend-mode: multiply;
    }

    .top-left,
    .top-right,
    .bottom-left,
    .bottom-right {
      position: absolute;
      z-index: 10;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .top-left {
      top: 26px;
      left: 28px;
    }

    .top-right {
      top: 26px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bottom-left {
      left: 28px;
      bottom: 24px;
    }

    .bottom-right {
      right: 28px;
      bottom: 24px;
      text-align: right;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 0 0 rgba(200, 66, 66, 0.38);
      animation: livePulse 1.5s infinite;
    }

    @keyframes livePulse {
      0% { box-shadow: 0 0 0 0 rgba(200, 66, 66, 0.38); }
      75% { box-shadow: 0 0 0 12px rgba(200, 66, 66, 0); }
      100% { box-shadow: 0 0 0 0 rgba(200, 66, 66, 0); }
    }

    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .system {
      position: relative;
      width: min(70vw, 860px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--line);
      pointer-events: none;
    }

    .ring-1 {
      width: 100%;
      height: 100%;
      animation: spinA var(--ring1-speed, 26s) linear infinite;
    }

    .ring-2 {
      width: 86%;
      height: 86%;
      border-style: dashed;
      opacity: 0.7;
      animation: spinB var(--ring2-speed, 18s) linear infinite;
    }

    .ring-3 {
      width: 72%;
      height: 72%;
      opacity: 0.48;
      animation: breathe 4.2s ease-in-out infinite;
    }

    .ring-4 {
      width: 58%;
      height: 58%;
      opacity: 0.24;
      border-color: var(--line-strong);
    }

    @keyframes spinA {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinB {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.42; }
      50% { transform: scale(1.018); opacity: 0.65; }
    }

    .orbit-layer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: spinOrbit var(--orbit-speed, 22s) linear infinite;
      pointer-events: none;
    }

    .orbit-layer.reverse {
      animation-direction: reverse;
    }

    @keyframes spinOrbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .orbit-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--point);
      box-shadow: 0 0 0 8px rgba(32, 75, 64, 0.05);
      transform: translate(-50%, -50%);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .orbit-dot.small {
      width: 7px;
      height: 7px;
      opacity: 0.7;
      box-shadow: 0 0 0 6px rgba(32, 75, 64, 0.04);
    }

    .center-core {
      position: relative;
      width: min(36vw, 360px);
      height: min(36vw, 360px);
      min-width: 260px;
      min-height: 260px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.98), rgba(255,255,255,0.82)),
        var(--white);
      border: 1px solid rgba(21, 56, 47, 0.12);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 4;
      overflow: hidden;
    }

    .center-core::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(32, 75, 64, 0.05), transparent 62%);
      opacity: 0.9;
      pointer-events: none;
    }

    .core-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .core-kicker {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .core-prize {
      font-size: clamp(52px, 7vw, 84px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .core-title {
      font-size: clamp(20px, 2.3vw, 28px);
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .core-time {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .count-pill {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      z-index: 6;
      min-width: 260px;
      padding: 16px 22px;
      border-radius: 999px;
      border: 1px solid rgba(21, 56, 47, 0.10);
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 40px rgba(21, 56, 47, 0.08);
      text-align: center;
    }

    .count-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .count-value {
      font-size: clamp(24px, 2.8vw, 34px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .count-value span {
      display: inline-block;
      min-width: 2ch;
    }

    .flash {
      animation: flash 0.5s ease;
    }

    .core-pop {
      animation: corePop 0.65s ease;
    }

    @keyframes flash {
      0% { transform: translateX(-50%) scale(1); }
      30% { transform: translateX(-50%) scale(1.06); }
      100% { transform: translateX(-50%) scale(1); }
    }

    @keyframes corePop {
      0% { transform: scale(1); }
      30% { transform: scale(1.035); }
      100% { transform: scale(1); }
    }

    .scanline {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent 0%, rgba(21, 56, 47, 0.035) 50%, transparent 100%);
      background-size: 100% 4px;
      opacity: 0.18;
      mix-blend-mode: multiply;
    }

    @media (max-width: 900px) {
      .system {
        width: min(88vw, 760px);
      }

      .center-core {
        min-width: 230px;
        min-height: 230px;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="scanline"></div>

  <div class="top-left">STANCE / LIVE EVENT BOARD</div>

  <div class="top-right">
    <span class="live-dot"></span>
    <span>LIVE BROADCAST MODE</span>
  </div>

  <div class="bottom-left" id="drawText">TODAY DRAW / 21:00</div>
  <div class="bottom-right" id="orbitInfo">ACTIVE ORBIT / 0 NODES</div>

  <div class="stage">
    <div class="system" id="system">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>

      <div class="orbit-layer" id="orbitOuter"></div>
      <div class="orbit-layer reverse" id="orbitInner"></div>

      <div class="center-core" id="core">
        <div class="core-inner">
          <div class="core-kicker">Today Prize</div>
          <div class="core-prize">₩5,000</div>
          <div class="core-title">오늘 당첨 가능 금액</div>
          <div class="core-time">오늘 추첨 시간 21:00</div>
        </div>
      </div>

      <div class="count-pill" id="countPill">
        <div class="count-label">Current Entries</div>
        <div class="count-value"><span id="entryCount">1</span>명</div>
      </div>
    </div>
  </div>

  <script>
    const entryCountEl = document.getElementById("entryCount");
    const orbitOuter = document.getElementById("orbitOuter");
    const orbitInner = document.getElementById("orbitInner");
    const orbitInfo = document.getElementById("orbitInfo");
    const countPill = document.getElementById("countPill");
    const core = document.getElementById("core");
    const system = document.getElementById("system");

    let entryCount = 1;
    let previousCount = entryCount;

    function getOrbitConfig(count) {
      // 응모 인원 수에 따라 점 개수/속도 변화
      // 너무 많아지면 과밀해지니 상한 설정
      const outerDots = Math.min(24, Math.max(4, Math.floor(count / 3) + 4));
      const innerDots = Math.min(18, Math.max(2, Math.floor(count / 6) + 2));

      const ring1Speed = Math.max(10, 26 - Math.floor(count / 8));
      const ring2Speed = Math.max(8, 18 - Math.floor(count / 10));
      const orbitSpeed = Math.max(9, 22 - Math.floor(count / 9));

      return { outerDots, innerDots, ring1Speed, ring2Speed, orbitSpeed };
    }

    function createDots(container, count, radiusPercent, small = false) {
      container.innerHTML = "";
      const size = container.clientWidth || container.parentElement.clientWidth;
      const center = size / 2;
      const radius = (size * radiusPercent) / 100;

      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const x = center + radius * Math.cos(angle);
        const y = center + radius * Math.sin(angle);

        const dot = document.createElement("span");
        dot.className = small ? "orbit-dot small" : "orbit-dot";
        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;

        // 약간의 크기 변화
        const scale = 0.88 + ((i % 5) * 0.06);
        dot.style.transform = `translate(-50%, -50%) scale(${scale})`;

        container.appendChild(dot);
      }
    }

    function renderOrbit(count) {
      const { outerDots, innerDots, ring1Speed, ring2Speed, orbitSpeed } = getOrbitConfig(count);

      system.style.setProperty("--ring1-speed", `${ring1Speed}s`);
      system.style.setProperty("--ring2-speed", `${ring2Speed}s`);
      system.style.setProperty("--orbit-speed", `${orbitSpeed}s`);

      createDots(orbitOuter, outerDots, 47, false);
      createDots(orbitInner, innerDots, 35, true);

      orbitInfo.textContent = `ACTIVE ORBIT / ${outerDots + innerDots} NODES`;
    }

    function animateUpdate() {
      countPill.classList.remove("flash");
      core.classList.remove("core-pop");

      void countPill.offsetWidth;
      void core.offsetWidth;

      countPill.classList.add("flash");
      core.classList.add("core-pop");
    }

    function updateCount(newCount) {
      if (newCount === previousCount) return;

      entryCount = newCount;
      entryCountEl.textContent = entryCount;
      renderOrbit(entryCount);
      animateUpdate();

      previousCount = newCount;
    }

    renderOrbit(entryCount);

    // ---------------------------
    // 1) 실제 서버 연동용
    // ---------------------------
    async function fetchStats() {
      try {
        const res = await fetch("https://mrdindoin.ddns.net/r/api/stats");
        if (!res.ok) return;

        const data = await res.json();
        if (typeof data.entry_count === "number") {
          updateCount(data.entry_count);
        }
      } catch (err) {
        // 송출 화면에서는 에러 문구를 굳이 표시하지 않음
      }
    }

    setInterval(fetchStats, 3000);

    // ---------------------------
    // 2) 데모 테스트용
    // 실제 서버 붙이면 아래 블록은 지우면 됨
    // ---------------------------
    /*
    setInterval(() => {
      const increase = Math.random() > 0.45;
      if (increase) {
        updateCount(previousCount + 1);
      }
    }, 3500);
    */
  </script>
</body>
</html>
